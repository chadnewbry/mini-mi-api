services:
  - type: web
    name: mini-mi-api
    runtime: docker
    plan: starter
    region: oregon
    dockerfilePath: ./Dockerfile
    dockerContext: .
    healthCheckPath: /healthz
    autoDeployTrigger: commit
    disk:
      name: mini-mi-data
      mountPath: /data
      sizeGB: 10
    envVars:
      - key: MINIME_PORT
        value: "10000"
      - key: MINIME_DATA_ROOT
        value: /data
      - key: MINIME_GENERATOR_MODE
        value: script
      - key: MINIME_RUN_WORKERS
        value: "true"
      - key: MINIME_WORKER_COUNT
        value: "4"
      - key: MINIME_WORKER_POLL_INTERVAL_MS
        value: "250"
      - key: MINIME_JOB_TIMEOUT_SECONDS
        value: "1200"
      - key: MINIME_STORE_BACKEND
        value: postgres
      - key: MINIME_DATABASE_URL
        sync: false
      - key: MINIME_ASSET_BACKEND
        value: s3
      - key: MINIME_ASSET_BUCKET
        sync: false
      - key: MINIME_ASSET_REGION
        value: us-west-2
      - key: MINIME_ASSET_KEY_PREFIX
        value: prod
      - key: MINIME_ASSET_SIGNED_URL_TTL_SECONDS
        value: "86400"
      - key: MINIME_ASSET_OBJECT_TAGGING
        value: app=minime&env=prod
      - key: MINIME_ASSET_ACCESS_KEY_ID
        sync: false
      - key: MINIME_ASSET_SECRET_ACCESS_KEY
        sync: false
      - key: TONGUE_COGNITO_ISSUER
        sync: false
      - key: TONGUE_COGNITO_CLIENT_ID
        sync: false
      - key: TONGUE_COGNITO_JWKS_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: XAI_API_KEY
        sync: false
      - key: POOFBG_API_KEY
        sync: false
